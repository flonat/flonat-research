[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scholarly"
version = "0.2.0"
description = "Multi-source scholarly search — MCP server + CLI across 15 providers (OpenAlex, S2, Crossref, Scopus, WoS, …)"
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.0.0",
    "requests",
    "httpx>=0.27",
    "biblio-sources @ git+https://github.com/user/biblio-sources.git@4707c06",
]

[project.scripts]
scholarly = "cli:main"

[tool.setuptools]
py-modules = [
    "_app",
    "cli",
    "formatters",
    "mcp_adapter",
    "scholarly_formatters",
    "server",
]

[tool.setuptools.packages.find]
include = ["tools*"]

[tool.uv.sources]
biblio-sources = { path = "../biblio-sources", editable = true }
