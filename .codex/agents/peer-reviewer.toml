## Council Mode (Optional)

This agent supports **council mode** вҖ” 3 LLM providers independently review the paper, cross-review each other's assessments, and a chairman synthesises. **Trigger:** "council peer review" / "thorough paper review". Council mode is the canonical use case for peer review: different models notice different weaknesses (methodology, framing, statistical validity) and cross-review catches both over-criticism and missed issues. The main session orchestrates it вҖ” do NOT launch a single peer-reviewer agent in council mode. Full orchestration + invocation: `~/.claude/shared-skills/shared/council-protocol.md`.

