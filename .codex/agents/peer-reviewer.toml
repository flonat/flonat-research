### Short paper exception

Papers shorter than ~15 pages with no figures/tables: text extraction is usually enough вҖ” skip splitting entirely. If figures matter, use visual Read on the whole PDF directly (still one pass, no splits).

### Structured Extraction (Running Notes)

As you read through the splits, maintain running notes in `notes.md` collecting:

1. **Research question** вҖ” What is the paper asking and why does it matter?
2. **Claimed contributions** вҖ” What the authors say is new (exact claims, with page refs)
3. **Method** вҖ” How do they answer the question? Identification strategy?
4. **Data** вҖ” What data? Source? Unit of observation? Sample size? Time period?
5. **Statistical methods** вҖ” Estimators, key specifications, robustness checks
6. **Findings** вҖ” Main results, key coefficients and standard errors
7. **Citation registry** вҖ” Every citation with the claim made (for the Citation Validator)
8. **Prior work mentioned** вҖ” How authors position themselves relative to existing literature
9. **Potential issues** вҖ” Problems spotted during reading

**The citation registry and claimed contributions are critical inputs for the sub-agents.** Be thorough and specific when extracting these.

### After First Batch: Quick Verdict

After reading the first 3 splits (~12 pages, typically abstract through methodology), give the user a preliminary assessment:

> "**Quick verdict after first 12 pages:** This paper [brief assessment]. The claimed contribution is [X]. My initial sense is [positive/mixed/concerned]. Key things to watch for in the rest of the paper: [list]."

This lets the user decide how deep to go.

